<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kayaking Map of Ireland</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; }

    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="info">Toggle routes (top right)</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>
  var map = L.map('map').setView([53.3498, -6.2603], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Define your GPX routes here
  var routes = [
    {
      name: "The Wicklow Way",
      file: "TheWicklowWay.gpx",
      color: "red"
    },
    {
      name: "Tinahely Round",
      file: "TinahelyRound.gpx",
      color: "#FF00FB"
    },
      ];

  var overlays = {};
  var boundsGroup = [];

  routes.forEach(function(route) {
    var gpxLayer = new L.GPX(route.file, {
      async: true,
      polyline_options: {
        color: route.color,
        weight: 4,
        opacity: 0.8
      },
      marker_options: {
        startIconUrl: null,
        endIconUrl: null,
        shadowUrl: null
      }
    });

    gpxLayer.on('loaded', function(e) {
      boundsGroup.push(e.target.getBounds());

      // Fit map to all routes once loaded
      if (boundsGroup.length === routes.length) {
        var group = L.featureGroup();
        boundsGroup.forEach(b => group.extend(b));
        map.fitBounds(group.getBounds());
      }
    });

    overlays[route.name] = gpxLayer;
  });

  // Add layer control (toggle UI)
  L.control.layers(null, overlays, { collapsed: false }).addTo(map);

</script>

</body>
</html>
