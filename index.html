<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kayaking Map of Ireland</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; }

    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 14px;
    }

    .info button {
      margin: 3px 0;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="info">
  <b>Filters</b><br>
  <button onclick="filterRoutes('all')">All</button>
  <button onclick="filterRoutes('hike')">Hikes</button>
  <button onclick="filterRoutes('kayak')">Kayaking</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>
  // =====================
  // MAP INIT
  // =====================
  var map = L.map('map').setView([53.5, -6.3], 8);

  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 17,
    attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | OpenTopoMap'
  }).addTo(map);

  // =====================
  // ROUTES DATA
  // =====================
  var routes = [
    {
      name: "The Wicklow Way",
      file: "TheWicklowWay.gpx",
      color: "red",
      type: "hike"
    },
    {
      name: "Tinahely Round",
      file: "TinahelyRound.gpx",
      color: "#FF00FB",
      type: "hike"
    },
    {
      name: "The Liffey Descent",
      file: "TheLiffeyDescent.gpx",
      color: "#1414FF",
      type: "kayak"
    },
    {
      name: "The Grand Canal",
      file: "TheGrandCanal.gpx",
      color: "#27F5EB",
      type: "kayak"
    }
  ];

  // =====================
  // STORAGE
  // =====================
  var layers = [];
  var overlays = {};
  var boundsGroup = [];

  // =====================
  // LOAD GPX ROUTES
  // =====================
  routes.forEach(function(route) {

    var gpxLayer = new L.GPX(route.file, {
      async: true,
      polyline_options: {
        color: route.color,
        weight: 4,
        opacity: 0.85
      },
      marker_options: {
        startIconUrl: null,
        endIconUrl: null,
        shadowUrl: null
      }
    });

    gpxLayer.on('loaded', function(e) {

  var gpx = e.target;
  var distance = (gpx.get_distance() / 1000).toFixed(2);

  boundsGroup.push(gpx.getBounds());

  if (boundsGroup.length === routes.length) {
    var group = L.featureGroup();
    boundsGroup.forEach(b => group.extend(b));
    map.fitBounds(group.getBounds());
  }

  // ✅ Attach popup to entire GPX layer properly
  gpx.bindPopup(`
    <b>${route.name}</b><br>
    Type: ${route.type}<br>
    Distance: ${distance} km
  `);

});

    layers.push({ route, layer: gpxLayer });
    overlays[route.name] = gpxLayer;

    gpxLayer.addTo(map);
  });

  // =====================
  // LEGEND (RESTORED)
  // =====================
  L.control.layers(null, overlays, { collapsed: false }).addTo(map);

  // =====================
  // FILTER SYSTEM
  // =====================
  function filterRoutes(type) {

    layers.forEach(item => {

      if (type === "all" || item.route.type === type) {
        item.layer.addTo(map);
      } else {
        map.removeLayer(item.layer);
      }

    });

  }

</script>

</body>
</html>
